name: Release Eidosup

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact Eidosup SemVer from eng/Eidosup.Version.props
        required: true
        type: string

jobs:
  verify-release:
    name: verify-release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Verify version and main ancestry
        id: version
        shell: pwsh
        run: |
          git fetch origin main
          git merge-base --is-ancestor $env:GITHUB_SHA origin/main
          if ($LASTEXITCODE -ne 0) { throw "Release commit must be reachable from origin/main." }
          $version = "${{ inputs.version }}"
          [xml]$props = Get-Content -Raw eng/Eidosup.Version.props
          $prefix = [string]$props.Project.PropertyGroup.EidosupVersionPrefix
          $suffix = [string]$props.Project.PropertyGroup.EidosupVersionSuffix
          $declared = if ($suffix) { "$prefix-$suffix" } else { $prefix }
          if ($declared -ne $version) { throw "Input version $version does not match $declared." }
          if (-not (Test-Path -LiteralPath "changelogs/eidosup/$version.md" -PathType Leaf)) {
            throw "Exact release notes are missing: changelogs/eidosup/$version.md"
          }
          $existingTag = git ls-remote --tags origin "refs/tags/eidosup-v$version"
          if ($LASTEXITCODE -ne 0) { throw "Failed to query existing tags." }
          if ($existingTag) { throw "Tag eidosup-v$version already exists." }
          "version=$version" >> $env:GITHUB_OUTPUT

  publish:
    name: publish-eidosup (${{ matrix.rid }})
    needs: verify-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { rid: win-x64, runner: windows-latest, extension: ".exe" }
          - { rid: win-arm64, runner: windows-latest, extension: ".exe" }
          - { rid: linux-x64, runner: ubuntu-latest, extension: "" }
          - { rid: linux-arm64, runner: ubuntu-latest, extension: "" }
          - { rid: osx-x64, runner: macos-latest, extension: "" }
          - { rid: osx-arm64, runner: macos-latest, extension: "" }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: 10.0.x }
      - name: Publish
        shell: pwsh
        run: |
          $rid = "${{ matrix.rid }}"
          dotnet publish src/Eidosup/Eidosup.csproj `
            -c Release `
            -r $rid `
            -p:SelfContained=true `
            -p:PublishSingleFile=true `
            -p:DebugType=None `
            -o artifacts/publish
          if ($LASTEXITCODE -ne 0) { throw "dotnet publish failed for $rid." }
          $binary = if ($rid.StartsWith("win-")) { "Eidosup.exe" } else { "Eidosup" }
          Copy-Item "artifacts/publish/$binary" "artifacts/eidosup-v${{ needs.verify-release.outputs.version }}-$rid${{ matrix.extension }}"
      - name: Smoke test native x64 candidate
        if: matrix.rid == 'win-x64' || matrix.rid == 'linux-x64'
        shell: pwsh
        run: |
          $path = "artifacts/eidosup-v${{ needs.verify-release.outputs.version }}-${{ matrix.rid }}${{ matrix.extension }}"
          if ($env:RUNNER_OS -ne 'Windows') { chmod +x $path }
          & $path --version
          if ($LASTEXITCODE -ne 0) { throw "Eidosup candidate smoke test failed." }
      - uses: actions/upload-artifact@v4
        with:
          name: eidosup-${{ matrix.rid }}
          path: artifacts/eidosup-v${{ needs.verify-release.outputs.version }}-${{ matrix.rid }}${{ matrix.extension }}
          if-no-files-found: error

  assemble-candidate:
    name: assemble-release-candidate
    needs:
      - verify-release
      - publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: eidosup-*
          path: artifacts/candidate
          merge-multiple: true
      - name: Generate and verify release metadata
        shell: pwsh
        run: |
          ./scripts/release/New-ReleaseArtifacts.ps1 `
            -Product eidosup `
            -Version "${{ needs.verify-release.outputs.version }}" `
            -CommitSha "$env:GITHUB_SHA" `
            -AssetDirectory artifacts/candidate
          ./scripts/release/Test-ReleaseAssets.ps1 `
            -Product eidosup `
            -Version "${{ needs.verify-release.outputs.version }}" `
            -CommitSha "$env:GITHUB_SHA" `
            -AssetDirectory artifacts/candidate
      - uses: actions/upload-artifact@v4
        with:
          name: eidosup-release-candidate
          path: artifacts/candidate/*
          if-no-files-found: error
          retention-days: 7

  release:
    name: publish-verified-release
    needs:
      - verify-release
      - assemble-candidate
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: eidosup-release-candidate
          path: artifacts/final
      - name: Reverify candidate and publish release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = "${{ needs.verify-release.outputs.version }}"
          ./scripts/release/Test-ReleaseAssets.ps1 `
            -Product eidosup `
            -Version $version `
            -CommitSha "$env:GITHUB_SHA" `
            -AssetDirectory artifacts/final
          $assets = @(Get-ChildItem -LiteralPath artifacts/final -File | Sort-Object Name | ForEach-Object FullName)
          $arguments = @(
            "release", "create", "eidosup-v$version"
          ) + $assets + @(
            "--target", $env:GITHUB_SHA,
            "--title", "eidosup-v$version",
            "--notes-file", "changelogs/eidosup/$version.md",
            "--draft"
          )
          & gh @arguments
          if ($LASTEXITCODE -ne 0) { throw "GitHub draft release creation failed." }

          $release = gh api "repos/$env:GITHUB_REPOSITORY/releases/tags/eidosup-v$version" | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0 -or -not $release.draft) { throw "Draft release verification failed." }
          if (@($release.assets).Count -ne $assets.Count) { throw "Draft release asset count mismatch." }
          foreach ($asset in $assets) {
            $local = Get-Item -LiteralPath $asset
            $remote = @($release.assets | Where-Object { $_.name -ceq $local.Name })
            if ($remote.Count -ne 1 -or $remote[0].size -ne $local.Length) {
              throw "Draft release asset mismatch: $($local.Name)"
            }
          }

          $isPrerelease = $version.Contains('-').ToString().ToLowerInvariant()
          gh release edit "eidosup-v$version" --draft=false "--prerelease=$isPrerelease"
          if ($LASTEXITCODE -ne 0) { throw "GitHub release publication failed." }
