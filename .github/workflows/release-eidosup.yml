name: Release Eidosup

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact Eidosup SemVer from eng/Eidosup.Version.props
        required: true
        type: string
      eidosc_version:
        description: Published Eidosc version used by the clean-install gate
        required: true
        type: string

jobs:
  verify-release:
    name: verify-release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Verify version and main ancestry
        id: version
        shell: pwsh
        run: |
          git fetch origin main
          git merge-base --is-ancestor $env:GITHUB_SHA origin/main
          if ($LASTEXITCODE -ne 0) { throw "Release commit must be reachable from origin/main." }
          $version = "${{ inputs.version }}"
          [xml]$props = Get-Content -Raw eng/Eidosup.Version.props
          $prefix = [string]$props.Project.PropertyGroup.EidosupVersionPrefix
          $suffix = [string]$props.Project.PropertyGroup.EidosupVersionSuffix
          $declared = if ($suffix) { "$prefix-$suffix" } else { $prefix }
          if ($declared -ne $version) { throw "Input version $version does not match $declared." }
          if (-not (Test-Path -LiteralPath "changelogs/eidosup/$version.md" -PathType Leaf)) {
            throw "Exact release notes are missing: changelogs/eidosup/$version.md"
          }
          $existingTag = git ls-remote --tags origin "refs/tags/eidosup-v$version"
          if ($LASTEXITCODE -ne 0) { throw "Failed to query existing tags." }
          if ($existingTag) { throw "Tag eidosup-v$version already exists." }
          "version=$version" >> $env:GITHUB_OUTPUT

  publish:
    name: publish-eidosup (${{ matrix.rid }})
    needs: verify-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { rid: win-x64, runner: windows-latest, extension: ".exe" }
          - { rid: win-arm64, runner: windows-11-arm, extension: ".exe" }
          - { rid: linux-x64, runner: ubuntu-latest, extension: "" }
          - { rid: linux-arm64, runner: ubuntu-24.04-arm, extension: "" }
          - { rid: osx-x64, runner: macos-15-intel, extension: "" }
          - { rid: osx-arm64, runner: macos-15, extension: "" }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: 10.0.x }
      - name: Publish
        shell: pwsh
        run: |
          $rid = "${{ matrix.rid }}"
          dotnet publish src/Eidosup/Eidosup.csproj `
            -c Release `
            -r $rid `
            -p:SelfContained=true `
            -p:PublishSingleFile=true `
            -p:PublishReadyToRun=true `
            -p:DebugType=None `
            -o artifacts/publish
          if ($LASTEXITCODE -ne 0) { throw "dotnet publish failed for $rid." }
          $binary = if ($rid.StartsWith("win-")) { "Eidosup.exe" } else { "Eidosup" }
          Copy-Item "artifacts/publish/$binary" "artifacts/eidosup-v${{ needs.verify-release.outputs.version }}-$rid${{ matrix.extension }}"
      - name: Smoke test native candidate
        shell: pwsh
        run: |
          $path = "artifacts/eidosup-v${{ needs.verify-release.outputs.version }}-${{ matrix.rid }}${{ matrix.extension }}"
          if ($env:RUNNER_OS -ne 'Windows') { chmod +x $path }
          & $path --version
          if ($LASTEXITCODE -ne 0) { throw "Eidosup candidate smoke test failed." }
      - uses: actions/upload-artifact@v4
        with:
          name: eidosup-${{ matrix.rid }}
          path: artifacts/eidosup-v${{ needs.verify-release.outputs.version }}-${{ matrix.rid }}${{ matrix.extension }}
          if-no-files-found: error

  assemble-candidate:
    name: assemble-release-candidate
    needs:
      - verify-release
      - publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: eidosup-*
          path: artifacts/candidate
          merge-multiple: true
      - name: Generate and verify release metadata
        shell: pwsh
        run: |
          ./scripts/release/New-ReleaseArtifacts.ps1 `
            -Product eidosup `
            -Version "${{ needs.verify-release.outputs.version }}" `
            -CommitSha "$env:GITHUB_SHA" `
            -AssetDirectory artifacts/candidate
          ./scripts/release/Test-ReleaseAssets.ps1 `
            -Product eidosup `
            -Version "${{ needs.verify-release.outputs.version }}" `
            -CommitSha "$env:GITHUB_SHA" `
            -AssetDirectory artifacts/candidate
      - uses: actions/upload-artifact@v4
        with:
          name: eidosup-release-candidate
          path: artifacts/candidate/*
          if-no-files-found: error
          retention-days: 7

  clean-install:
    name: clean-install (${{ matrix.rid }})
    needs:
      - verify-release
      - publish
      - assemble-candidate
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - { rid: win-x64, runner: windows-latest, extension: ".exe" }
          - { rid: win-arm64, runner: windows-11-arm, extension: ".exe" }
          - { rid: linux-x64, runner: ubuntu-latest, extension: "" }
          - { rid: linux-arm64, runner: ubuntu-24.04-arm, extension: "" }
          - { rid: osx-x64, runner: macos-15-intel, extension: "" }
          - { rid: osx-arm64, runner: macos-15, extension: "" }
    steps:
      - uses: actions/checkout@v4
      - name: Checkout pinned tutorial smoke fixture
        uses: actions/checkout@v4
        with:
          repository: dlqw/eidos-tutorial
          ref: 6d1374f2123ee90f7d04341728d666fe925f6669
          path: artifacts/tutorial
          persist-credentials: false
      - uses: actions/download-artifact@v4
        with:
          name: eidosup-${{ matrix.rid }}
          path: artifacts/eidosup
      - name: Download published Eidosc release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          New-Item -ItemType Directory -Path artifacts/eidosc -Force | Out-Null
          gh release download "eidosc-v${{ inputs.eidosc_version }}" `
            --repo "$env:GITHUB_REPOSITORY" `
            --dir artifacts/eidosc
          if ($LASTEXITCODE -ne 0) { throw "Failed to download the published Eidosc release." }
      - name: Verify Eidosup candidate clean installation
        shell: pwsh
        run: |
          $metadata = Get-Content -Raw artifacts/eidosc/eidosc-release.json | ConvertFrom-Json
          $candidate = "artifacts/eidosup/eidosup-v${{ needs.verify-release.outputs.version }}-${{ matrix.rid }}${{ matrix.extension }}"
          if ($env:RUNNER_OS -ne 'Windows') { chmod +x $candidate }
          ./scripts/release/Invoke-EidosupCleanInstall.ps1 `
            -Version "${{ inputs.eidosc_version }}" `
            -CommitSha ([string]$metadata.commit) `
            -CandidateDirectory artifacts/eidosc `
            -EidosupPath $candidate `
            -TutorialExample artifacts/tutorial/examples/29_precompiled_stdlib.eidos

  release:
    name: publish-verified-release
    needs:
      - verify-release
      - assemble-candidate
      - clean-install
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: eidosup-release-candidate
          path: artifacts/final
      - name: Reverify candidate and publish release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ./scripts/release/Publish-VerifiedRelease.ps1 `
            -Product eidosup `
            -Version "${{ needs.verify-release.outputs.version }}" `
            -CommitSha "$env:GITHUB_SHA" `
            -AssetDirectory artifacts/final `
            -NotesFile "changelogs/eidosup/${{ needs.verify-release.outputs.version }}.md" `
            -Repository "$env:GITHUB_REPOSITORY"

  published-install:
    name: published-install (${{ matrix.rid }})
    needs:
      - verify-release
      - release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { rid: win-x64, runner: windows-latest, extension: ".exe" }
          - { rid: win-arm64, runner: windows-11-arm, extension: ".exe" }
          - { rid: linux-x64, runner: ubuntu-latest, extension: "" }
          - { rid: linux-arm64, runner: ubuntu-24.04-arm, extension: "" }
          - { rid: osx-x64, runner: macos-15-intel, extension: "" }
          - { rid: osx-arm64, runner: macos-15, extension: "" }
    steps:
      - uses: actions/checkout@v4
      - name: Checkout pinned tutorial native fixture
        uses: actions/checkout@v4
        with:
          repository: dlqw/eidos-tutorial
          ref: 6d1374f2123ee90f7d04341728d666fe925f6669
          path: artifacts/tutorial
          persist-credentials: false
      - name: Download Eidosup anonymously and install published Eidosc
        shell: pwsh
        run: |
          $version = "${{ needs.verify-release.outputs.version }}"
          $asset = "eidosup-v$version-${{ matrix.rid }}${{ matrix.extension }}"
          $candidate = Join-Path artifacts/eidosup $asset
          New-Item -ItemType Directory -Path (Split-Path -Parent $candidate) -Force | Out-Null
          $uri = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/eidosup-v$version/$asset"
          $downloaded = $false
          for ($attempt = 1; $attempt -le 6; $attempt++) {
            try {
              Invoke-WebRequest -UseBasicParsing -Uri $uri -OutFile $candidate
              $downloaded = $true
              break
            } catch {
              if ($attempt -eq 6) { throw }
              Start-Sleep -Seconds (10 * $attempt)
            }
          }
          if (-not $downloaded) { throw "Published Eidosup asset was not downloaded." }
          if ($env:RUNNER_OS -ne 'Windows') { chmod +x $candidate }
          Remove-Item Env:GITHUB_TOKEN, Env:GH_TOKEN -ErrorAction SilentlyContinue
          ./scripts/release/Invoke-EidosupPublishedInstall.ps1 `
            -Version "${{ inputs.eidosc_version }}" `
            -EidosupPath $candidate `
            -TutorialExample artifacts/tutorial/examples/29_precompiled_stdlib.eidos `
            -ExpectedRid "${{ matrix.rid }}"
