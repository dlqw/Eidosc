name: Release Eidosc

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact Eidosc SemVer from eng/Eidosc.Version.props
        required: true
        type: string

jobs:
  verify-release:
    name: verify-release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify release input and main ancestry
        id: version
        shell: pwsh
        run: |
          git fetch origin main
          git merge-base --is-ancestor $env:GITHUB_SHA origin/main
          if ($LASTEXITCODE -ne 0) { throw "Release commit must be reachable from origin/main." }
          $version = "${{ inputs.version }}"
          ./scripts/versioning/verify-versions.ps1
          [xml]$props = Get-Content -Raw eng/Eidosc.Version.props
          $prefix = [string]$props.Project.PropertyGroup.EidoscVersionPrefix
          $suffix = [string]$props.Project.PropertyGroup.EidoscVersionSuffix
          $declared = if ($suffix) { "$prefix-$suffix" } else { $prefix }
          if ($declared -ne $version) { throw "Input version $version does not match $declared." }
          if (-not (Test-Path -LiteralPath "changelogs/$version.md" -PathType Leaf)) {
            throw "Exact release notes are missing: changelogs/$version.md"
          }
          $tag = "eidosc-v$version"
          $existingTag = git ls-remote --tags origin "refs/tags/$tag"
          if ($LASTEXITCODE -ne 0) { throw "Failed to query existing tags." }
          if ($existingTag) { throw "Tag $tag already exists." }
          "version=$version" >> $env:GITHUB_OUTPUT

  publish-eidosc:
    name: publish-eidosc (${{ matrix.rid }})
    needs: verify-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { rid: win-x64, runner: windows-latest }
          - { rid: win-arm64, runner: windows-latest }
          - { rid: linux-x64, runner: ubuntu-latest }
          - { rid: linux-arm64, runner: ubuntu-latest }
          - { rid: osx-x64, runner: macos-latest }
          - { rid: osx-arm64, runner: macos-latest }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: 10.0.x }
      - name: Publish eidosc
        shell: pwsh
        run: |
          $version = "${{ needs.verify-release.outputs.version }}"
          $rid = "${{ matrix.rid }}"
          $publishDir = Join-Path $PWD "artifacts/publish/eidosc/$rid"
          $binaryName = if ($rid.StartsWith('win-')) { 'eidosc.exe' } else { 'eidosc' }
          $publishedBinaryName = if ($rid.StartsWith('win-')) { 'Eidosc.Cli.exe' } else { 'Eidosc.Cli' }
          dotnet publish src/Eidosc.Cli/Eidosc.Cli.csproj `
            -c Release `
            -r $rid `
            -p:SelfContained=true `
            -p:PublishSingleFile=true `
            -p:DebugType=None `
            -o $publishDir
          if ($LASTEXITCODE -ne 0) { throw "dotnet publish failed for $rid." }
          Move-Item (Join-Path $publishDir $publishedBinaryName) (Join-Path $publishDir $binaryName)
          $bundle = Join-Path $PWD "artifacts/eidosc-v$version-$rid.zip"
          Compress-Archive -Path (Join-Path $publishDir '*') -DestinationPath $bundle
      - uses: actions/upload-artifact@v4
        with:
          name: eidosc-${{ matrix.rid }}
          path: artifacts/eidosc-v${{ needs.verify-release.outputs.version }}-${{ matrix.rid }}.zip
          if-no-files-found: error

  pack-dotnet-tool:
    name: pack-dotnet-tool
    needs: verify-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: 10.0.x }
      - name: Pack eidosc tool
        run: >
          dotnet pack src/Eidosc.Cli/Eidosc.Cli.csproj
          -c Release
          -o artifacts/nupkg
          /p:PackageVersion=${{ needs.verify-release.outputs.version }}
      - uses: actions/upload-artifact@v4
        with:
          name: eidosc-nupkg
          path: artifacts/nupkg/Eidosc.Cli.${{ needs.verify-release.outputs.version }}.nupkg
          if-no-files-found: error

  publish-eidosup-candidate:
    name: publish-eidosup-candidate (${{ matrix.rid }})
    needs: verify-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { rid: win-x64, runner: windows-latest, binary: Eidosup.exe, output: eidosup-candidate.exe }
          - { rid: linux-x64, runner: ubuntu-latest, binary: Eidosup, output: eidosup-candidate }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: 10.0.x }
      - name: Publish Eidosup candidate
        shell: pwsh
        run: |
          dotnet publish src/Eidosup/Eidosup.csproj `
            -c Release `
            -r "${{ matrix.rid }}" `
            -p:SelfContained=true `
            -p:PublishSingleFile=true `
            -p:DebugType=None `
            -o artifacts/eidosup
          if ($LASTEXITCODE -ne 0) { throw "Eidosup candidate publish failed." }
          Copy-Item "artifacts/eidosup/${{ matrix.binary }}" "artifacts/${{ matrix.output }}"
      - uses: actions/upload-artifact@v4
        with:
          name: eidosup-candidate-${{ matrix.rid }}
          path: artifacts/${{ matrix.output }}
          if-no-files-found: error

  assemble-candidate:
    name: assemble-release-candidate
    needs:
      - verify-release
      - publish-eidosc
      - pack-dotnet-tool
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: eidosc-*
          path: artifacts/candidate
          merge-multiple: true
      - name: Generate and verify release metadata
        shell: pwsh
        run: |
          ./scripts/release/New-ReleaseArtifacts.ps1 `
            -Product eidosc `
            -Version "${{ needs.verify-release.outputs.version }}" `
            -CommitSha "$env:GITHUB_SHA" `
            -AssetDirectory artifacts/candidate
          ./scripts/release/Test-ReleaseAssets.ps1 `
            -Product eidosc `
            -Version "${{ needs.verify-release.outputs.version }}" `
            -CommitSha "$env:GITHUB_SHA" `
            -AssetDirectory artifacts/candidate
      - uses: actions/upload-artifact@v4
        with:
          name: eidosc-release-candidate
          path: artifacts/candidate/*
          if-no-files-found: error
          retention-days: 7

  clean-install:
    name: clean-install (${{ matrix.rid }})
    needs:
      - verify-release
      - assemble-candidate
      - publish-eidosup-candidate
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { rid: win-x64, runner: windows-latest, binary: eidosup-candidate.exe }
          - { rid: linux-x64, runner: ubuntu-latest, binary: eidosup-candidate }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: eidosc-release-candidate
          path: artifacts/candidate
      - uses: actions/download-artifact@v4
        with:
          name: eidosup-candidate-${{ matrix.rid }}
          path: artifacts/eidosup
      - name: Verify clean Eidosup installation
        shell: pwsh
        run: |
          if ($env:RUNNER_OS -ne 'Windows') { chmod +x "artifacts/eidosup/${{ matrix.binary }}" }
          ./scripts/release/Invoke-EidosupCleanInstall.ps1 `
            -Version "${{ needs.verify-release.outputs.version }}" `
            -CommitSha "$env:GITHUB_SHA" `
            -CandidateDirectory artifacts/candidate `
            -EidosupPath "artifacts/eidosup/${{ matrix.binary }}" `
            -TutorialExample "docs/tutorial/examples/01_literals_bindings.eidos"

  create-release:
    name: publish-verified-release
    needs:
      - verify-release
      - clean-install
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: eidosc-release-candidate
          path: artifacts/final
      - name: Reverify candidate and publish release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = "${{ needs.verify-release.outputs.version }}"
          ./scripts/release/Test-ReleaseAssets.ps1 `
            -Product eidosc `
            -Version $version `
            -CommitSha "$env:GITHUB_SHA" `
            -AssetDirectory artifacts/final
          $assets = @(Get-ChildItem -LiteralPath artifacts/final -File | Sort-Object Name | ForEach-Object FullName)
          $arguments = @(
            "release", "create", "eidosc-v$version"
          ) + $assets + @(
            "--target", $env:GITHUB_SHA,
            "--title", "eidosc-v$version",
            "--notes-file", "changelogs/$version.md",
            "--draft"
          )
          & gh @arguments
          if ($LASTEXITCODE -ne 0) { throw "GitHub draft release creation failed." }

          $release = gh api "repos/$env:GITHUB_REPOSITORY/releases/tags/eidosc-v$version" | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0 -or -not $release.draft) { throw "Draft release verification failed." }
          if (@($release.assets).Count -ne $assets.Count) { throw "Draft release asset count mismatch." }
          foreach ($asset in $assets) {
            $local = Get-Item -LiteralPath $asset
            $remote = @($release.assets | Where-Object { $_.name -ceq $local.Name })
            if ($remote.Count -ne 1 -or $remote[0].size -ne $local.Length) {
              throw "Draft release asset mismatch: $($local.Name)"
            }
          }

          $isPrerelease = $version.Contains('-').ToString().ToLowerInvariant()
          gh release edit "eidosc-v$version" --draft=false "--prerelease=$isPrerelease"
          if ($LASTEXITCODE -ne 0) { throw "GitHub release publication failed." }
