name: Release Eidos Bindgen

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact Eidos Bindgen SemVer
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: 10.0.x }
      - name: Verify and package
        shell: pwsh
        run: |
          git fetch origin main
          git merge-base --is-ancestor $env:GITHUB_SHA origin/main
          if ($LASTEXITCODE -ne 0) { throw "Release commit must be on main." }
          [xml]$props = Get-Content -Raw eng/EidosBindgen.Version.props
          $prefix = [string]$props.Project.PropertyGroup.EidosBindgenVersionPrefix
          $suffix = [string]$props.Project.PropertyGroup.EidosBindgenVersionSuffix
          $declared = if ($suffix) { "$prefix-$suffix" } else { $prefix }
          if ($declared -ne "${{ inputs.version }}") { throw "Version mismatch: $declared" }
          dotnet publish src/Eidosc.Bindgen/Eidosc.Bindgen.csproj -c Release -r linux-x64 -p:SelfContained=true -p:PublishSingleFile=true -o artifacts/publish
          Compress-Archive artifacts/publish/* "artifacts/eidos-bindgen-v${{ inputs.version }}-linux-x64.zip"
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "eidos-bindgen-v${{ inputs.version }}" "artifacts/eidos-bindgen-v${{ inputs.version }}-linux-x64.zip" --target "$GITHUB_SHA" --prerelease --title "eidos-bindgen-v${{ inputs.version }}" --notes-file "changelogs/eidos-bindgen/${{ inputs.version }}.md"
