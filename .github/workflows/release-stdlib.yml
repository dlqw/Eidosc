name: Release Eidos Std

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact Std SemVer
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Verify and package
        shell: pwsh
        run: |
          git fetch origin main
          git merge-base --is-ancestor $env:GITHUB_SHA origin/main
          if ($LASTEXITCODE -ne 0) { throw "Release commit must be on main." }
          ./scripts/versioning/verify-versions.ps1
          [xml]$props = Get-Content -Raw eng/Std.Version.props
          $declared = [string]$props.Project.PropertyGroup.EidosStdVersion
          if ($declared -ne "${{ inputs.version }}") { throw "Version mismatch: $declared" }
          Compress-Archive src/Eidosc/Stdlib/Precompiled/* "stdlib-v${{ inputs.version }}.zip"
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "stdlib-v${{ inputs.version }}" "stdlib-v${{ inputs.version }}.zip" --target "$GITHUB_SHA" --prerelease --title "stdlib-v${{ inputs.version }}" --notes-file "changelogs/stdlib/${{ inputs.version }}.md"
